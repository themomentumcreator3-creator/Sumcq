                            <!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KarnQuest - By Sushant</title>
    <style>
        /* Reel Size (Mobile-First Vertical) Setup */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: #212529; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* Main App Container (Reel Format) */
        #app-container {
            width: 100%;
            max-width: 400px;
            height: 100vh;
            max-height: 850px;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        /* Header */
        header { background-color: #1a73e8; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-size: 18px; font-weight: 700; }
        .head-btns { display: flex; gap: 5px; align-items: center; }
        .head-btns button { background: white; color: #1a73e8; border: none; padding: 5px 8px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 12px; }
        .trial-badge { background: #ffc107; color: #000; font-size: 10px; padding: 3px 6px; border-radius: 10px; font-weight: bold; }

        .view-section { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        .hidden { display: none !important; }

        /* --- LOGIN MODE UI --- */
        .login-content { padding: 30px 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #f8f9fa; text-align: center; height: 100%; }
        .login-content h2 { color: #1a73e8; margin-bottom: 5px; font-size: 24px; }
        .login-content p { color: #6c757d; font-size: 14px; margin-bottom: 25px; }
        .login-input { width: 100%; padding: 12px; border: 1px solid #ced4da; border-radius: 5px; margin-bottom: 15px; font-size: 15px; text-align: center; }
        .action-btn { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        
        /* --- STUDY MODE UI --- */
        .section-bar { display: flex; overflow-x: auto; background: #f1f3f5; padding: 10px; border-bottom: 1px solid #dee2e6; }
        .section-bar button { flex-shrink: 0; margin-right: 10px; padding: 6px 15px; border: none; background: #dee2e6; border-radius: 20px; cursor: pointer; font-size: 14px; }
        .section-bar button.active { background: #1a73e8; color: white; }
        .section-bar::-webkit-scrollbar { display: none; }
        
        .study-content { flex-grow: 1; padding: 20px; overflow-y: auto; }
        .question-text { font-size: 17px; font-weight: 600; margin-bottom: 20px; color: #343a40; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option { padding: 12px; border: 2px solid #e9ecef; border-radius: 8px; background: #f8f9fa; cursor: pointer; font-size: 15px; transition: 0.2s; }
        .option.correct { border-color: #28a745; background: #d4edda; }
        .option.wrong { border-color: #dc3545; background: #f8d7da; }

        .bottom-nav { padding: 15px; background: white; border-top: 1px solid #dee2e6; display: flex; justify-content: space-between; }
        .nav-btn { padding: 10px 20px; border: none; background: #1a73e8; color: white; border-radius: 6px; font-weight: bold; cursor: pointer; width: 48%; }
        .nav-btn:disabled { background: #adb5bd; }

        /* --- ADMIN MODE UI --- */
        .admin-content { padding: 20px; overflow-y: auto; flex-grow: 1; background: #f8f9fa; }
        .admin-section { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .admin-section h3 { font-size: 16px; color: #343a40; margin-bottom: 10px; border-bottom: 2px solid #1a73e8; padding-bottom: 5px; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 8px; border: 1px solid #ced4da; border-radius: 5px; font-size: 14px; }
        
        .file-upload-box { border: 2px dashed #1a73e8; padding: 15px; text-align: center; border-radius: 8px; background: #f1f3f5; margin-bottom: 10px; }
        .file-upload-box input { display: none; }
        .file-upload-box label { color: #1a73e8; font-weight: bold; cursor: pointer; display: block; }
        
        /* --- PAYWALL UI --- */
        .paywall-content { padding: 20px; text-align: center; overflow-y: auto; background: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        .paywall-content h2 { color: #dc3545; margin-bottom: 10px; font-size: 22px; }
        .price-box { background: #e3f2fd; color: #1a73e8; padding: 15px; border-radius: 10px; font-size: 20px; font-weight: bold; margin-bottom: 20px; width: 100%; border: 2px dashed #1a73e8; }
        .qr-code { width: 200px; height: 200px; object-fit: cover; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 10px; }
        .upi-id { font-size: 16px; font-weight: bold; color: #343a40; margin-bottom: 20px; background: #f1f3f5; padding: 8px 15px; border-radius: 5px; }

        .toast { background: #28a745; color: white; text-align: center; padding: 10px; font-size: 14px; display: none; position: absolute; width: 100%; z-index: 10; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="toastMessage" class="toast">Action Successful!</div>

    <header id="appHeader" class="hidden">
        <div>
            <h1>KarnQuest</h1>
            <span id="trialBadge" class="trial-badge hidden">Trial Active</span>
        </div>
        <div class="head-btns" id="headerBtns">
            <button onclick="toggleLanguage()" id="langBtn">EN / HI</button>
            <button onclick="toggleView()" id="viewBtn">Admin</button>
            <button onclick="logout()" style="background: #dc3545; color: white;">Out</button>
        </div>
    </header>

    <!-- LOGIN MODE -->
    <div id="loginView" class="view-section login-content">
        <h2>KarnQuest</h2>
        <p>Login to start 2-Day Free Trial</p>
        <input type="text" id="userIdentifier" class="login-input" placeholder="Enter Mobile No. or Email">
        <button class="action-btn" id="sendOtpBtn" onclick="sendMockOtp()">Send OTP</button>
        <div id="otpSection" class="hidden" style="width: 100%;">
            <input type="number" id="otpInput" class="login-input" placeholder="Enter OTP (Use 1234)">
            <button class="action-btn" style="background: #28a745;" onclick="verifyMockOtp()">Verify & Login</button>
        </div>
    </div>

    <!-- STUDY MODE -->
    <div id="studyView" class="view-section hidden">
        <div class="section-bar" id="sectionBar"></div>
        <div class="study-content">
            <div class="question-text" id="questionText">Loading...</div>
            <div class="options" id="optionsContainer"></div>
        </div>
        <div class="bottom-nav">
            <button class="nav-btn" id="prevBtn" onclick="prevQuestion()">Prev</button>
            <button class="nav-btn" id="nextBtn" onclick="nextQuestion()">Next</button>
        </div>
    </div>

    <!-- ADMIN MODE -->
    <div id="adminView" class="view-section hidden admin-content">
        
        <!-- Bulk CSV Upload Section -->
        <div class="admin-section">
            <h3>Bulk Upload (CSV)</h3>
            <button class="action-btn" style="background: #6c757d; font-size: 13px; padding: 8px;" onclick="downloadSampleCSV()">⬇️ Download Sample CSV</button>
            <div class="file-upload-box">
                <label for="csvFileInput">📁 Tap to Select CSV File</label>
                <input type="file" id="csvFileInput" accept=".csv" onchange="handleCSVUpload(event)">
            </div>
            <p id="csvStatus" style="font-size: 12px; color: #28a745; text-align: center; font-weight: bold;"></p>
        </div>

        <!-- Manual Single Question Upload Section -->
        <div class="admin-section">
            <h3>Add Single Question</h3>
            <div class="form-group"><label>Subject</label><input type="text" id="addSection" placeholder="e.g. GK, Math"></div>
            <div class="form-group"><label>Question (EN)</label><input type="text" id="addQEn"></div>
            <div class="form-group"><label>Question (HI)</label><input type="text" id="addQHi"></div>
            <div class="form-group"><label>Options (EN) - Comma separated</label><input type="text" id="addOptEn"></div>
            <div class="form-group"><label>Options (HI) - Comma separated</label><input type="text" id="addOptHi"></div>
            <div class="form-group">
                <label>Correct Answer (1-4)</label>
                <select id="addAnswer"><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option></select>
            </div>
            <button class="action-btn" style="background: #1a73e8; margin-top: 10px;" onclick="saveNewQuestion()">Upload Single Q</button>
        </div>
    </div>

    <!-- PAYWALL MODE -->
    <div id="paywallView" class="view-section hidden paywall-content">
        <h2>Trial Expired!</h2>
        <p>Unlock all questions and features.</p>
        <div class="price-box">1 Month Access - ₹10</div>
        <img src="1000039967.jpg" alt="Payment QR Code" class="qr-code">
        <div class="upi-id">UPI: 9354774788@fam</div>
        <input type="text" id="utrInput" class="login-input" placeholder="Enter 12-digit UTR">
        <button class="action-btn" style="background: #28a745;" onclick="verifyPayment()">Verify & Activate</button>
        <button class="action-btn" style="background: #6c757d;" onclick="logout()">Logout</button>
    </div>
</div>

<script>
    // --- DATABASE INIT ---
    let db = JSON.parse(localStorage.getItem('karnQuestDB')) || {
        "GK": [{ en: { q: "Who is known as the Father of the Nation?", options: ["S.C. Bose", "Mahatma Gandhi", "Bhagat Singh", "J. Nehru"] }, hi: { q: "राष्ट्रपिता के रूप में किसे जाना जाता है?", options: ["सुभाष चंद्र बोस", "महात्मा गांधी", "भगत सिंह", "जवाहरलाल नेहरू"] }, answerIndex: 1 }]
    };
    
    // User DB (Reel-format Login persistence)
    let usersDB = JSON.parse(localStorage.getItem('karnQuestUsers')) || {};
    let loggedInUser = localStorage.getItem('karnQuestActiveUser');
    
    let currentLang = 'hi', currentSection = Object.keys(db)[0] || '', currentQuestionIndex = 0, isAdminView = false;

    // --- CSV BULK UPLOAD LOGIC ---
    function downloadSampleCSV() {
        // Generates a 12-column robust CSV format
        const csvContent = "data:text/csv;charset=utf-8,Subject,Question(EN),Question(HI),Opt1(EN),Opt2(EN),Opt3(EN),Opt4(EN),Opt1(HI),Opt2(HI),Opt3(HI),Opt4(HI),Correct(1-4)\nMath,What is 88x88?,88x88 का मान क्या होगा?,7744,7844,6744,8844,7744,7844,6744,8844,1\nGK,Capital of India?,भारत की राजधानी?,Delhi,Mumbai,Kolkata,Goa,दिल्ली,मुंबई,कोलकाता,गोवा,1";
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", "KarnQuest_Sample.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function handleCSVUpload(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const text = e.target.result;
            const lines = text.split(/\r\n|\n/);
            let addedCount = 0;

            for (let i = 1; i < lines.length; i++) { // Skip header row
                const line = lines[i].trim();
                if (!line) continue;
                
                // Basic CSV line parser to handle quotes
                let cols = [], curr = '', inQuotes = false;
                for(let c=0; c<line.length; c++) {
                    if(line[c] === '"') inQuotes = !inQuotes;
                    else if(line[c] === ',' && !inQuotes) { cols.push(curr); curr=''; }
                    else curr += line[c];
                }
                cols.push(curr);

                if (cols.length >= 12) {
                    const subject = cols[0].trim();
                    const qEn = cols[1].trim();
                    const qHi = cols[2].trim();
                    const oEn = [cols[3].trim(), cols[4].trim(), cols[5].trim(), cols[6].trim()];
                    const oHi = [cols[7].trim(), cols[8].trim(), cols[9].trim(), cols[10].trim()];
                    const ans = parseInt(cols[11].trim()) - 1;

                    if (!db[subject]) db[subject] = [];
                    db[subject].push({
                        en: { q: qEn, options: oEn },
                        hi: { q: qHi, options: oHi },
                        answerIndex: ans
                    });
                    addedCount++;
                }
            }
            
            if(addedCount > 0) {
                localStorage.setItem('karnQuestDB', JSON.stringify(db));
                document.getElementById('csvStatus').innerText = `${addedCount} Questions added successfully!`;
                showToast(`${addedCount} Bulk Questions Added!`);
                currentSection = Object.keys(db)[0]; // Reset to show new data
            } else {
                alert("No valid data found. Please follow the sample CSV format exactly (12 columns).");
            }
            event.target.value = ''; // Reset input
        };
        reader.readAsText(file);
    }

    // --- SINGLE QUESTION UPLOAD (MANUAL) ---
    function saveNewQuestion() {
        const section = document.getElementById('addSection').value.trim(), qEn = document.getElementById('addQEn').value.trim(), qHi = document.getElementById('addQHi').value.trim();
        const optEnStr = document.getElementById('addOptEn').value.trim(), optHiStr = document.getElementById('addOptHi').value.trim(), ansIndex = parseInt(document.getElementById('addAnswer').value) - 1;
        if(!section || !qEn || !qHi || !optEnStr || !optHiStr) return alert("सभी फ़ील्ड भरें!");
        const optionsEn = optEnStr.split(',').map(s => s.trim()), optionsHi = optHiStr.split(',').map(s => s.trim());
        if(optionsEn.length !== 4 || optionsHi.length !== 4) return alert("ठीक 4 विकल्प दें।");
        if(!db[section]) db[section] = [];
        db[section].push({ en: { q: qEn, options: optionsEn }, hi: { q: qHi, options: optionsHi }, answerIndex: ansIndex });
        localStorage.setItem('karnQuestDB', JSON.stringify(db)); showToast("Question Added!");
    }

    // --- LOGIN / OTP LOGIC ---
    function sendMockOtp() {
        const identifier = document.getElementById('userIdentifier').value.trim();
        if(identifier.length < 5) { alert("Please enter valid ID"); return; }
        document.getElementById('sendOtpBtn').classList.add('hidden');
        document.getElementById('otpSection').classList.remove('hidden');
        alert("DEMO OTP: 1234");
    }

    function verifyMockOtp() {
        const otp = document.getElementById('otpInput').value.trim(), identifier = document.getElementById('userIdentifier').value.trim();
        if(otp === "1234") {
            loggedInUser = identifier; localStorage.setItem('karnQuestActiveUser', loggedInUser);
            if(!usersDB[loggedInUser]) { usersDB[loggedInUser] = { installDate: Date.now(), subExpiry: 0 }; localStorage.setItem('karnQuestUsers', JSON.stringify(usersDB)); }
            showToast("Login Successful!"); startAppFlow();
        } else alert("Invalid OTP! Use 1234.");
    }

    function logout() { localStorage.removeItem('karnQuestActiveUser'); location.reload(); }

    // --- APP FLOW & STUDY LOGIC ---
    function startAppFlow() {
        if(!loggedInUser) { hideAllViews(); document.getElementById('loginView').classList.remove('hidden'); document.getElementById('appHeader').classList.add('hidden'); return; }
        document.getElementById('appHeader').classList.remove('hidden');
        const userData = usersDB[loggedInUser], now = Date.now(), trialDuration = 2 * 24 * 60 * 60 * 1000;
        if (now < userData.subExpiry) { document.getElementById('trialBadge').classList.add('hidden'); loadStudyMode(); }
        else if ((now - userData.installDate) < trialDuration) {
            document.getElementById('trialBadge').classList.remove('hidden');
            document.getElementById('trialBadge').innerText = `Trial: ${Math.ceil((trialDuration - (now - userData.installDate)) / 3600000)}h left`;
            loadStudyMode();
        } else showPaywall();
    }

    function loadStudyMode() {
        hideAllViews(); document.getElementById('studyView').classList.remove('hidden'); document.getElementById('headerBtns').classList.remove('hidden');
        if(Object.keys(db).length > 0) { currentSection = Object.keys(db)[0]; loadSections(); loadQuestion(); }
    }

    function hideAllViews() { ['loginView', 'studyView', 'adminView', 'paywallView'].forEach(id => document.getElementById(id).classList.add('hidden')); }
    function showPaywall() { hideAllViews(); document.getElementById('paywallView').classList.remove('hidden'); document.getElementById('headerBtns').classList.add('hidden'); document.getElementById('trialBadge').classList.add('hidden'); }

    function loadSections() {
        const bar = document.getElementById('sectionBar'); bar.innerHTML = '';
        Object.keys(db).forEach(section => {
            const btn = document.createElement('button'); btn.innerText = section;
            if(section === currentSection) btn.classList.add('active');
            btn.onclick = () => { currentSection = section; currentQuestionIndex = 0; loadSections(); loadQuestion(); };
            bar.appendChild(btn);
        });
    }

    function loadQuestion() {
        if (!db[currentSection] || db[currentSection].length === 0) return;
        const qData = db[currentSection][currentQuestionIndex], langData = qData[currentLang];
        document.getElementById('questionText').innerText = `Q${currentQuestionIndex + 1}. ${langData.q}`;
        const container = document.getElementById('optionsContainer'); container.innerHTML = '';
        langData.options.forEach((opt, index) => {
            const div = document.createElement('div'); div.className = 'option'; div.innerText = opt;
            div.onclick = () => {
                const allOpts = container.children;
                for (let i = 0; i < allOpts.length; i++) { allOpts[i].style.pointerEvents = 'none'; if (i === qData.answerIndex) allOpts[i].classList.add('correct'); }
                if (index !== qData.answerIndex) div.classList.add('wrong');
            };
            container.appendChild(div);
        });
        document.getElementById('prevBtn').disabled = currentQuestionIndex === 0; document.getElementById('nextBtn').disabled = currentQuestionIndex === db[currentSection].length - 1;
    }

    function nextQuestion() { if (currentQuestionIndex < db[currentSection].length - 1) { currentQuestionIndex++; loadQuestion(); } }
    function prevQuestion() { if (currentQuestionIndex > 0) { currentQuestionIndex--; loadQuestion(); } }
    function toggleLanguage() { currentLang = currentLang === 'en' ? 'hi' : 'en'; document.getElementById('langBtn').innerText = currentLang === 'en' ? "English" : "हिन्दी"; if(!isAdminView) loadQuestion(); }
    function toggleView() { isAdminView = !isAdminView; hideAllViews(); if(isAdminView) { document.getElementById('adm
